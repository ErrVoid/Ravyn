name: ravyn
description: "Ravyn — Wisdom in every scroll."
publish_to: 'none'
version: 0.0.4+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.5.0
  cloud_firestore: ^6.1.3
  firebase_messaging: ^16.1.2

  # Networking
  http: ^1.4.0

  # State management
  provider: ^6.1.5

  # Fonts
  google_fonts: ^8.0.2

  # Local notifications
  flutter_local_notifications: ^21.0.0

  # Background tasks
  workmanager: ^0.9.0

  # Local storage
  shared_preferences: ^2.5.3
  share_plus: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  image: ^4.8.0

flutter:
  uses-material-design: true

  assets:
    - bgs/
